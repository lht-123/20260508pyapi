name: CI/CD - Local Build on Server

on:
  push:
    branches: [ main, master ]

env:
  DEPLOY_SERVER: your-centos-server-ip
  DEPLOY_USER: root                    # 建议使用普通用户并授权 docker
  PROJECT_DIR: /data/git/20260508pyapi       # 服务器上的项目目录

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 pytest
      - name: Lint
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Test
        run: echo "Run pytest here"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to CentOS (Build locally without registry)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.DEPLOY_SERVER }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ${{ env.PROJECT_DIR }} || exit 1
            git pull origin main   
            docker-compose build
            docker-compose up -d --force-recreate
            echo "Deployment finished. Showing logs:"
            docker-compose logs --tail=50